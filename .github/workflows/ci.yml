name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,dev]"

      - name: Run Ruff Lint Check
        run: python -m ruff check .

      - name: Run Mypy Type Check
        run: python -m mypy rrl/

      - name: Run tests
        # The retriever tests inject a MockSentenceTransformer, so the suite
        # runs network-free (no model weights are downloaded).
        run: python -m pytest tests/ -q

      - name: Run recurring gate self-test (smoke test)
        run: python3 sim/run_gate_recurring.py --selftest
